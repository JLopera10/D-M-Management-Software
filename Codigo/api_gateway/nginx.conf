events {
    worker_connections 1024;
}

http {
    server {
        listen 80;

        # Route requests starting with /api/auth to the LOGSEC service
        location /api/auth/ {
            proxy_pass http://service_logsec:8001/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Route requests starting with /api/core to the CORE PROJECTS service
        location /api/core/ {
            proxy_pass http://service_core_projects:8002/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Route requests starting with /api/public to the PUBLIC service
        location /api/public/ {
            proxy_pass http://service_public:8003/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Route requests starting with /api/documents to the DOCUMENTS service
        location /api/documents/ {
            proxy_pass http://service_documents:8004/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Route requests starting with /api/chatbot to the CHATBOT service
        location /api/chatbot/ {
            proxy_pass http://service_chatbot:8005/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Route requests starting with /api/analytics to the ANALYTICS service
        location /api/analytics/ {
            proxy_pass http://service_analytics:8006/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}